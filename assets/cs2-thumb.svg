<svg viewBox="0 0 1200 640" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'IBM Plex Mono', ui-monospace, monospace">
  <title>Case File 02 — Meesho seller onboarding audit: current flow with three issues, rebuilt into three clean steps</title>
  <desc>Left: the audited current flow as four steps, three flagged with critical issues — forced WhatsApp hand-off, mid-flow sign-up ambush, and checkout before any customer. Right: the rebuilt three-step flow — select and share, wait for interest, place the order — with sign-up moved upfront and no forced hand-offs.</desc>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="640" fill="#fffdf9"/>
  <rect x="0.5" y="0.5" width="1199" height="639" fill="none" stroke="#1c1a17" stroke-width="1"/>

  <!-- top label strip -->
  <text x="40" y="52" font-size="17" letter-spacing="2" fill="#a4441c">FILE 02 · MEESHO SELLER ONBOARDING AUDIT</text>
  <text x="1160" y="52" font-size="17" letter-spacing="1" fill="#8a857c" text-anchor="end">AUDIT THE FLOW, THEN REBUILD IT</text>
  <line x1="40" y1="72" x2="1160" y2="72" stroke="#e2dcd2" stroke-width="1"/>

  <!-- ================= LEFT — CURRENT FLOW (audited) ================= -->
  <text x="284" y="118" font-size="16" letter-spacing="1.5" fill="#8a857c" text-anchor="middle">CURRENT FLOW — 3 CRITICAL ISSUES</text>

  <!-- chip 1: clean -->
  <g>
    <rect x="56" y="150" width="452" height="78" rx="10" fill="#faf6f0" stroke="#e2dcd2" stroke-width="1.5"/>
    <circle cx="90" cy="189" r="17" fill="#fffdf9" stroke="#8a857c" stroke-width="1.5"/>
    <text x="90" y="195" font-size="15" fill="#57534c" text-anchor="middle">1</text>
    <text x="122" y="184" font-size="17" fill="#1c1a17" font-family="Georgia, serif">Pick a product</text>
    <text x="122" y="207" font-size="12" fill="#8a857c">passes the audit</text>
  </g>

  <!-- connector -->
  <line x1="90" y1="228" x2="90" y2="246" stroke="#e2dcd2" stroke-width="2"/>

  <!-- chip 2: issue -->
  <g>
    <rect x="56" y="246" width="452" height="78" rx="10" fill="#f3e4da" stroke="#a4441c" stroke-width="1.5"/>
    <rect x="56" y="246" width="5" height="78" rx="2.5" fill="#a4441c"/>
    <circle cx="90" cy="285" r="17" fill="#fffdf9" stroke="#a4441c" stroke-width="1.5"/>
    <text x="90" y="291" font-size="15" fill="#a4441c" text-anchor="middle">2</text>
    <text x="122" y="280" font-size="17" fill="#1c1a17" font-family="Georgia, serif">Share &#8594; WhatsApp &#215;2</text>
    <text x="122" y="303" font-size="12" fill="#a4441c">forced hand-off, no way back</text>
    <circle cx="478" cy="272" r="12" fill="#a4441c"/>
    <text x="478" y="277" font-size="15" fill="#fffdf9" text-anchor="middle" font-weight="700">!</text>
  </g>

  <line x1="90" y1="324" x2="90" y2="342" stroke="#e2dcd2" stroke-width="2"/>

  <!-- chip 3: issue -->
  <g>
    <rect x="56" y="342" width="452" height="78" rx="10" fill="#f3e4da" stroke="#a4441c" stroke-width="1.5"/>
    <rect x="56" y="342" width="5" height="78" rx="2.5" fill="#a4441c"/>
    <circle cx="90" cy="381" r="17" fill="#fffdf9" stroke="#a4441c" stroke-width="1.5"/>
    <text x="90" y="387" font-size="15" fill="#a4441c" text-anchor="middle">3</text>
    <text x="122" y="376" font-size="17" fill="#1c1a17" font-family="Georgia, serif">Sign-up dialog</text>
    <text x="122" y="399" font-size="12" fill="#a4441c">ambush mid-flow, dead end</text>
    <circle cx="478" cy="368" r="12" fill="#a4441c"/>
    <text x="478" y="373" font-size="15" fill="#fffdf9" text-anchor="middle" font-weight="700">!</text>
  </g>

  <line x1="90" y1="420" x2="90" y2="438" stroke="#e2dcd2" stroke-width="2"/>

  <!-- chip 4: issue -->
  <g>
    <rect x="56" y="438" width="452" height="78" rx="10" fill="#f3e4da" stroke="#a4441c" stroke-width="1.5"/>
    <rect x="56" y="438" width="5" height="78" rx="2.5" fill="#a4441c"/>
    <circle cx="90" cy="477" r="17" fill="#fffdf9" stroke="#a4441c" stroke-width="1.5"/>
    <text x="90" y="483" font-size="15" fill="#a4441c" text-anchor="middle">4</text>
    <text x="122" y="472" font-size="17" fill="#1c1a17" font-family="Georgia, serif">Checkout now</text>
    <text x="122" y="495" font-size="12" fill="#a4441c">before any customer replies</text>
    <circle cx="478" cy="464" r="12" fill="#a4441c"/>
    <text x="478" y="469" font-size="15" fill="#fffdf9" text-anchor="middle" font-weight="700">!</text>
  </g>

  <!-- ================= CENTER TRANSFORM ================= -->
  <line x1="600" y1="150" x2="600" y2="516" stroke="#a4441c" stroke-width="2" stroke-dasharray="2 7"/>
  <circle cx="600" cy="333" r="27" fill="#a4441c"/>
  <text x="600" y="342" font-size="24" fill="#fffdf9" text-anchor="middle">&#8594;</text>

  <!-- ================= RIGHT — PROPOSED FLOW ================= -->
  <text x="916" y="118" font-size="16" letter-spacing="1.5" fill="#a4441c" text-anchor="middle">PROPOSED — 3 CLEAN STEPS</text>

  <!-- step 1 -->
  <g>
    <rect x="692" y="150" width="452" height="104" rx="12" fill="#fffdf9" stroke="#1c1a17" stroke-width="1.5"/>
    <circle cx="726" cy="184" r="18" fill="#a4441c"/>
    <text x="726" y="190" font-size="15" fill="#fffdf9" text-anchor="middle">1</text>
    <text x="760" y="184" font-size="18" fill="#1c1a17" font-family="Georgia, serif" font-weight="600">Select &amp; share</text>
    <text x="760" y="207" font-size="12" fill="#8a857c">one dropdown, cancellable</text>
    <!-- channel pills -->
    <rect x="760" y="218" width="48" height="22" rx="11" fill="#f3e4da"/>
    <text x="784" y="233" font-size="11" fill="#a4441c" text-anchor="middle">WA</text>
    <rect x="816" y="218" width="48" height="22" rx="11" fill="#f3e4da"/>
    <text x="840" y="233" font-size="11" fill="#a4441c" text-anchor="middle">IG</text>
    <rect x="872" y="218" width="48" height="22" rx="11" fill="#f3e4da"/>
    <text x="896" y="233" font-size="11" fill="#a4441c" text-anchor="middle">FB</text>
  </g>

  <line x1="726" y1="254" x2="726" y2="276" stroke="#e2dcd2" stroke-width="2"/>

  <!-- step 2 -->
  <g>
    <rect x="692" y="276" width="452" height="90" rx="12" fill="#fffdf9" stroke="#1c1a17" stroke-width="1.5"/>
    <circle cx="726" cy="315" r="18" fill="#a4441c"/>
    <text x="726" y="321" font-size="15" fill="#fffdf9" text-anchor="middle">2</text>
    <text x="760" y="311" font-size="18" fill="#1c1a17" font-family="Georgia, serif" font-weight="600">Wait for interest</text>
    <text x="760" y="334" font-size="12" fill="#8a857c">shared products filtered to their own list</text>
  </g>

  <line x1="726" y1="366" x2="726" y2="388" stroke="#e2dcd2" stroke-width="2"/>

  <!-- step 3 -->
  <g>
    <rect x="692" y="388" width="452" height="90" rx="12" fill="#fffdf9" stroke="#1c1a17" stroke-width="1.5"/>
    <circle cx="726" cy="427" r="18" fill="#a4441c"/>
    <text x="726" y="433" font-size="15" fill="#fffdf9" text-anchor="middle">3</text>
    <text x="760" y="423" font-size="18" fill="#1c1a17" font-family="Georgia, serif" font-weight="600">Place the order + margin</text>
    <text x="760" y="446" font-size="12" fill="#8a857c">tied to the customer &amp; channel</text>
  </g>

  <!-- upfront sign-up tag -->
  <rect x="692" y="494" width="452" height="34" rx="17" fill="#faf6f0" stroke="#e2dcd2" stroke-width="1.5"/>
  <path d="M714 511 l5 5 l10 -10" fill="none" stroke="#a4441c" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="742" y="516" font-size="12.5" fill="#57534c">Sign-up moved upfront · 0 forced hand-offs</text>

  <!-- bottom footnote -->
  <line x1="40" y1="596" x2="1160" y2="596" stroke="#e2dcd2" stroke-width="1"/>
  <text x="600" y="624" font-size="14.5" fill="#57534c" text-anchor="middle" font-family="Georgia, serif" font-style="italic">Runner-up · UX Hack, April 2021 — six real-world steps mapped to three, full audit inside</text>
</svg>
